    <title>ADK PHOTOCOPY</title>

</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <a href="Index.html" class="logo">
            <img src="LOGO ADK.png" alt="ADK Logo">
            <span>ADK PHOTOCOPY</span>
        </a>
        <div class="menu">
            <a href="Index.html">Home</a>
            <a href="#"></a>
            <a href="tutorial.html">Tutorial</a>
            <a href="#"></a>
            <a href="jasa.html">Jasa</a>
        </div>

        <div class="nav-right">
            <button class="btn-nav">Cek Pembelian</button>
        </div>
    </div>

    <!-- HERO -->
    <div class="hero">

        <!-- KIRI -->
        <div class="hero-left">
            <h1>
                Buat Nomor Halaman,<br>
                Kurang Dari 5 Menit
            </h1>

            <p>
                Solusi praktis untuk penomoran halaman
                sesuai pedoman kampus.
            </p>

            <!-- <div class="stats">
                <div>
                    <h2>35.000++</h2>
                    <span>Pengguna Aktif</span>
                </div>

                <div>
                    <h2>100.000++</h2>
                    <span>Total Dokumen</span>
                </div>
            </div> -->

            <button class="btn-main">Coba Sekarang</button>
        </div>

        <!-- KANAN -->
        <div class="hero-right">
            <div class="card">

                <div class="upload-box">
                    <p>Klik atau seret file ke sini</p>
                    <span> Format: Word/Docx</span>
                </div>
                <input type="file" class="file-input">
                <div class="paket">

                    <div class="paket">

                        <p>Pilih Paket:</p>
                        <label class="paket-item">
                            <input type="radio" name="paket">
                            <span>Paket 1</span>

                            <div class="info-box">
                                <b>Paket 1</b><br>
                                ✔ Start at 1 dari halaman sampul<br>
                                ✔ Semuanya di Tengah Bawah

                            </div>
                        </label>

                        <label class="paket-item">
                            <input type="radio" name="paket">
                            <span>Paket 2</span>

                            <div class="info-box">
                                <b>Paket 2</b><br>
                                ✔ Start at i di halaman sampul<br>
                                ✔ Start at 1 di BAB I<br>
                                ✔ Semuanya di Tengah Bawah

                            </div>
                        </label>

                        <label class="paket-item">
                            <input type="radio" name="paket">
                            <span>Paket 3 (POPULER)</span>

                            <div class="info-box">
                                <b>Paket 3</b><br>
                                ✔ Sampul tanpa halaman<br>
                                ✔ Start at ii di halaman kedua<br>
                                ✔ Romawi di Tengah Bawah<br>
                                ✔ Start at 1 di BAB I<br>
                                ✔ Awal BAB Tengah Bawah, isi BAB Kanan Atas<br>
                            </div>
                        </label>

                        <label class="paket-item">
                            <input type="radio" name="paket">
                            <span>Cepat</span>

                            <div class="info-box">
                                <b>Paket Cepat</b><br>
                                ✔ Prioritas pengerjaan<br>
                                ✔ Selesai cepat
                            </div>
                        </label>

                    </div>

                </div>

                <a href="bayar.html" class="btn-Upload">Bayar</a>

            </div>
        </div>

    </div>


</body>

</html>
